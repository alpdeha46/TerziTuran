version: "3.9"
services:
  terzituran-web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: terzituran-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - terzituran_data:/app/data
    ports:
      - "8080:8080"

  nginx:
    image: nginx:stable
    container_name: terzituran-nginx
    restart: unless-stopped
    depends_on:
      - terzituran-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  terzituran_data:
