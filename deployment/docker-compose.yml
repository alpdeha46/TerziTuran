version: "3.9"
services:
  terzituran-web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: terzituran-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Key: ${TERZITURAN_JWT_KEY:?TERZITURAN_JWT_KEY must be set}
      BootstrapAdmin__Username: ${TERZITURAN_ADMIN_USERNAME:-admin}
      BootstrapAdmin__FullName: ${TERZITURAN_ADMIN_FULLNAME:-Sistem Yoneticisi}
      BootstrapAdmin__Email: ${TERZITURAN_ADMIN_EMAIL:-admin@terzituran.local}
      BootstrapAdmin__Password: ${TERZITURAN_ADMIN_PASSWORD:?TERZITURAN_ADMIN_PASSWORD must be set}
    volumes:
      - terzituran_data:/app/data
    ports:
      - "8080:8080"

  nginx:
    image: nginx:stable
    container_name: terzituran-nginx
    restart: unless-stopped
    depends_on:
      - terzituran-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  terzituran_data:
